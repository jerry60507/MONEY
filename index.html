<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0E5A54">
<title>旅費分帳</title>
<style>
  :root{
    --bg:#EEF2F0; --ink:#16302B; --teal:#0E5A54; --teal-soft:#DDEBE8;
    --amber:#E8A33D; --amber-soft:#FBEED6; --red:#C4543A;
    --paper:#FDFDFB; --line:#D5DEDB; --muted:#5E716C; --faint:#8B9A95;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;font-size:15px}
  .wrap{max-width:460px;margin:0 auto;padding:20px 16px 48px}
  input,select,button{font-family:inherit;font-size:15px}
  input:focus,select:focus{outline:2px solid var(--teal);outline-offset:1px}
  button:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
  .num{font-variant-numeric:tabular-nums;font-family:'SF Mono','Cascadia Mono',Consolas,monospace}
  
  .ticket{background:var(--teal);color:var(--paper);border-radius:14px;
    padding:18px 20px 14px;margin-bottom:10px;position:relative;overflow:hidden; transition: all 0.3s;}
  .ticket.editing{background:var(--amber); color:var(--ink);}
  .ticket.editing input.trip-name {color:var(--ink);}
  .ticket .eyebrow{display:flex;justify-content:space-between;font-size:11px;letter-spacing:.2em;opacity:.8;margin-bottom:4px}
  .ticket input.trip-name{background:transparent;border:none;color:var(--paper);
    font-size:22px;font-weight:700;width:100%;padding:0}
  .ticket .meta{display:flex;justify-content:space-between;margin-top:10px;font-size:13px;opacity:.9}
  .ticket .hole{position:absolute;top:50%;width:16px;height:16px;border-radius:8px;background:var(--bg)}
  .ticket .hole.l{left:-8px}.ticket .hole.r{right:-8px}

  .syncbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:0 4px}
  .syncbar .status{font-size:11.5px;color:var(--faint)}
  .syncbar .status.err{color:var(--red)}
  .syncbar .status.live{color:var(--teal);font-weight:600}

  nav{display:flex;gap:6px;margin-bottom:16px}
  nav button{flex:1;padding:10px 0;border-radius:10px;border:none;cursor:pointer;
    font-weight:600;background:var(--paper);color:var(--ink);box-shadow:0 1px 2px rgba(22,48,43,.08)}
  nav button.on{background:var(--ink);color:var(--paper);box-shadow:none}
  nav .badge{margin-left:5px;background:var(--amber);color:var(--ink);border-radius:8px;padding:1px 7px;font-size:12px}

  .card{background:var(--paper);border-radius:12px;padding:16px;margin-bottom:16px;
    box-shadow:0 1px 3px rgba(22,48,43,.08)}
  .row{display:flex;gap:8px;align-items:center}
  .field{padding:10px 12px;border-radius:9px;border:1px solid var(--line);background:#fff;min-width:0; appearance: none;}
  .btn{padding:0 20px;border-radius:10px;border:none;background:var(--teal);
    color:var(--paper);font-weight:700;cursor:pointer; display: flex; justify-content: center; align-items: center; gap: 6px;}
  .btn.small{padding:8px 14px;font-size:13px;border-radius:9px}
  .btn.big{width:100%;padding:12px 0;border-radius:10px}
  .btn.ghost{background:transparent;border:1.5px solid var(--teal);color:var(--teal)}
  .btn.line{background:#06C755; color:white; border:none;}
  .btn.danger{background:var(--red); color:white;}
  .btn.edit-mode{background:var(--amber); color:var(--ink);}
  .btn:disabled{background:#C7D4D0;cursor:default;border:none;color:var(--paper)}
  
  .label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px}
  .link{border:none;background:transparent;color:var(--teal);cursor:pointer;
    font-size:12px;text-decoration:underline;padding:0}
  .action-btn{border:none;background:transparent;color:#A3B2AD;cursor:pointer;font-size:16px;line-height:1;padding:4px; border-radius: 6px;}
  .action-btn:hover{background:var(--bg); color:var(--teal);}
  .empty{text-align:center;color:#6B7E79;padding:40px 0;font-size:14px}
  .errbox{margin-top:14px;background:#F9E3DC;color:var(--red);border-radius:9px;
    padding:10px 14px;font-size:13.5px;font-weight:600}

  .chip{padding:7px 14px;border-radius:999px;cursor:pointer;font-size:13px;font-weight:600;
    border:1.5px solid var(--line);background:transparent;color:var(--faint)}
  .chip.on{border-color:var(--teal);background:var(--teal-soft);color:var(--teal)}
  .mode{flex:1;padding:8px 0;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;
    border:1.5px solid var(--line);background:transparent;color:var(--faint)}
  .mode.on{border-color:var(--teal);background:var(--teal);color:var(--paper)}

  .item{background:var(--paper);border-radius:10px;padding:12px 14px;margin-bottom:8px;
    box-shadow:0 1px 2px rgba(22,48,43,.06); transition: background 0.3s;}
  .item.editing { background: var(--amber-soft); border: 1px solid var(--amber); }
  .pos{color:var(--teal)} .neg{color:var(--red)} .zero{color:var(--faint)}

  .rates{background:var(--amber-soft);border-radius:12px;padding:12px 14px;margin-bottom:12px}
  .invite{background:var(--amber-soft);border-radius:12px;padding:14px 16px;margin-bottom:14px;text-align:center}
  .invite .code{font-size:28px;font-weight:800;letter-spacing:.35em;color:var(--ink)}
  .hint{font-size:11.5px;color:var(--faint);margin-top:8px}
  .convert{font-size:12.5px;color:var(--teal);margin-bottom:10px;background:var(--teal-soft);
    border-radius:7px;padding:6px 10px}
  .check{font-size:12.5px;margin-top:6px;border-radius:7px;padding:7px 10px;font-weight:600}
  .check.ok{background:var(--teal-soft);color:var(--teal)}
  .check.bad{background:#F9E3DC;color:var(--red)}
  
  .receipt{background:var(--paper);padding:22px 20px 26px;box-shadow:0 2px 8px rgba(22,48,43,.1);
    -webkit-mask:linear-gradient(#000 0 0) top/100% calc(100% - 8px) no-repeat,
      radial-gradient(circle at 8px 0,transparent 8px,#000 8px) bottom/16px 8px repeat-x;
    mask:linear-gradient(#000 0 0) top/100% calc(100% - 8px) no-repeat,
      radial-gradient(circle at 8px 0,transparent 8px,#000 8px) bottom/16px 8px repeat-x}
  .receipt .head{text-align:center;border-bottom:1.5px dashed var(--line);padding-bottom:14px;margin-bottom:14px}
  .receipt .sect{font-size:12px;color:var(--faint);margin-bottom:8px}
  .balrow{display:flex;justify-content:space-between;padding:5px 0;font-size:14.5px}
  .transfer{display:flex;justify-content:space-between;align-items:center;
    background:var(--teal-soft);border-radius:9px;padding:11px 14px;margin-bottom:8px; border:1px solid transparent;}
  .transfer.mine{background:var(--amber-soft)}
  .transfer.settled{opacity: 0.6; background: var(--bg); border-color: var(--line);}
  .transfer.settled .num {text-decoration: line-through; color:var(--muted);}
  .foot{text-align:center;margin-top:16px;font-size:11px;letter-spacing:.2em;color:#A3B2AD}

  .center-screen{min-height:100vh;display:grid;place-items:center;color:var(--teal)}
  
  .modal-overlay { position: fixed; inset: 0; background: rgba(22,48,43,0.6); backdrop-filter: blur(2px);
    display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;}
  .modal-overlay.active { opacity: 1; pointer-events: auto; }
  .modal-box { background: var(--paper); width: 100%; max-width: 340px; border-radius: 16px; padding: 24px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1); transform: scale(0.95); transition: transform 0.2s;}
  .modal-overlay.active .modal-box { transform: scale(1); }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; color:var(--ink); }
  .modal-desc { font-size: 14px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  
  .history-trip { display:flex; justify-content:space-between; align-items:center; padding: 12px; border: 1px solid var(--line); border-radius: 10px; margin-bottom: 8px; cursor: pointer; }
  .history-trip:hover { background: var(--teal-soft); border-color: var(--teal); }
  
  .custom-checkbox { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; color: var(--muted); user-select: none;}
  .custom-checkbox input { appearance: none; width: 18px; height: 18px; border: 2px solid var(--faint); border-radius: 4px; margin:0; outline: none; transition: 0.2s; position: relative; cursor: pointer;}
  .custom-checkbox input:checked { background: var(--teal); border-color: var(--teal); }
  .custom-checkbox input:checked::after { content: ''; position: absolute; left: 4px; top: 1px; width: 4px; height: 8px; border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg); }
</style>
</head>
<body>
<div id="app"><div class="center-screen">載入中⋯</div></div>

<div id="modal" class="modal-overlay">
  <div class="modal-box">
    <div id="modal-title" class="modal-title">提示</div>
    <div id="modal-desc" class="modal-desc">內容</div>
    <div class="modal-actions">
      <button class="btn ghost small" onclick="Modal.close()">取消</button>
      <button id="modal-confirm" class="btn small">確定</button>
    </div>
  </div>
</div>

<script type="module">
const firebaseConfig = {
  apiKey: "AIzaSyAopkJDsw7UoLRuoQQIM7pQskAvvbev294",
  authDomain: "trip-split-e9535.firebaseapp.com",
  projectId: "trip-split-e9535",
  storageBucket: "trip-split-e9535.firebasestorage.app",
  messagingSenderId: "569232089168",
  appId: "1:569232089168:web:4c1534daca8005ac61b155",
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, collection, onSnapshot, arrayUnion, arrayRemove, deleteField, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const $app = document.getElementById("app");
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt = n => {
  const r = Math.round(n*100)/100;
  return Number.isInteger(r) ? r.toLocaleString() : r.toLocaleString(undefined,{minimumFractionDigits:1,maximumFractionDigits:2});
};
const getToday = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

// 注意：因環境強制規定，路徑需改為 /artifacts/{appId}/public/data/trips
const appId = typeof __app_id !== 'undefined' ? __app_id : firebaseConfig.projectId;
const TRIPS_PATH = ['artifacts', appId, 'public', 'data', 'trips'];

const SESSION_KEY = "trip-split-session";
const HISTORY_KEY = "trip-split-history"; // 儲存多個旅程紀錄

let code = "", myName = "";
let meta = null;                 
let expenses = [];
let unsubMeta = null, unsubExp = null;
let live = false, syncErr = false;

// UI 暫存狀態
let U = {
  screen:"loading", tab:"expenses", showRates:false,
  desc:"", amount:"", currency:"TWD", payer:"", sharers:[], date: getToday(),
  splitMode:"equal", customShares:{}, newMember:"",
  newCode:"", newRate:"", lobbyName:"", lobbyCode:"", lobbyTrip:"", lobbyErr:"", lobbyBusy:false,
  editingId: null, // 記錄目前正在編輯的帳目 ID
  history: JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]")
};

const members = () => meta?.members || [];
const homeCur = () => meta?.homeCurrency || "TWD";
const rates = () => meta?.rates || {};
const rateOf = c => c === homeCur() ? 1 : (rates()[c] || 0);
const settledMap = () => meta?.settledTransfers || {}; 

// 確保 Firestore 路徑正確
const tripRef = () => doc(db, ...TRIPS_PATH, code);
const expCol = () => collection(db, ...TRIPS_PATH, code, "expenses");

const genCode = () => {
  const chars = "ABCDEFGHJKMNPQRSTUVWXYZ23456789";
  let s = "";
  const a = new Uint32Array(6); crypto.getRandomValues(a);
  for (let i = 0; i < 6; i++) s += chars[a[i] % chars.length];
  return s;
};

const Modal = {
  show(title, desc, confirmText, onConfirm, isDanger = false) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-desc').innerHTML = desc;
    const btn = document.getElementById('modal-confirm');
    btn.textContent = confirmText;
    btn.className = `btn small ${isDanger ? 'danger' : ''}`;
    btn.onclick = () => { onConfirm(); this.close(); };
    document.getElementById('modal').classList.add('active');
  },
  close() {
    document.getElementById('modal').classList.remove('active');
  }
};

function attachListeners() {
  detachListeners();
  unsubMeta = onSnapshot(tripRef(), snap => {
    if (!snap.exists()) { 
      Modal.show("旅程已結束", "這個旅程已經被刪除。", "返回大廳", () => leaveTrip(true)); 
      return; 
    }
    meta = snap.data();
    if (!members().includes(U.payer)) U.payer = members().includes(myName) ? myName : "";
    U.sharers = U.sharers.filter(m => members().includes(m));
    if (U.currency !== homeCur() && !rates()[U.currency]) U.currency = homeCur();
    live = true; syncErr = false;
    refreshData();
  }, () => { syncErr = true; live = false; refreshSyncbar(); });

  unsubExp = onSnapshot(expCol(), snap => {
    expenses = snap.docs.map(d => ({...d.data(), _docId: d.id})).sort((a,b) => b.id - a.id);
    live = true; syncErr = false;
    refreshData();
  }, () => { syncErr = true; live = false; refreshSyncbar(); });
}
function detachListeners(){
  if (unsubMeta) unsubMeta(); if (unsubExp) unsubExp();
  unsubMeta = unsubExp = null; live = false;
}

function calc(){
  const bal = Object.fromEntries(members().map(m=>[m,0]));
  let total = 0;
  for (const e of expenses){
    const rate = e.rate || 1, home = e.amount * rate;
    total += home;
    if (bal[e.payer] !== undefined) bal[e.payer] += home;
    if (e.splitMode === "custom" && e.customShares){
      for (const [m,v] of Object.entries(e.customShares))
        if (bal[m] !== undefined) bal[m] -= v * rate;
    } else {
      const share = home / e.sharers.length;
      for (const s of e.sharers) if (bal[s] !== undefined) bal[s] -= share;
    }
  }
  const debtors=[], creditors=[];
  for (const [m,v] of Object.entries(bal)){
    if (v < -0.01) debtors.push({m,v:-v});
    else if (v > 0.01) creditors.push({m,v});
  }
  debtors.sort((a,b)=>b.v-a.v); creditors.sort((a,b)=>b.v-a.v);
  const transfers=[]; let i=0,j=0;
  while (i<debtors.length && j<creditors.length){
    const pay = Math.min(debtors[i].v, creditors[j].v);
    transfers.push({from:debtors[i].m, to:creditors[j].m, amount:pay, key:`${debtors[i].m}_${creditors[j].m}`});
    debtors[i].v -= pay; creditors[j].v -= pay;
    if (debtors[i].v < 0.01) i++;
    if (creditors[j].v < 0.01) j++;
  }
  return {bal, transfers, total};
}
const balClass = v => v>0.01?"pos":v<-0.01?"neg":"zero";

const A = window.A = {
  setTab(t){ U.tab=t; render(); },
  input(k,v){ U[k]=v; refreshHints(); },
  inputRe(k,v){ U[k]=v; render(); },

  async createTrip(){
    const name = U.lobbyName.trim();
    if (!name){ U.lobbyErr="請先輸入你的名字"; render(); return; }
    U.lobbyBusy=true; U.lobbyErr=""; render();
    try {
      let c = genCode();
      for (let i=0;i<3;i++){
        if (!(await getDoc(doc(db,...TRIPS_PATH,c))).exists()) break;
        c = genCode();
      }
      const tripName = U.lobbyTrip.trim() || "我們的旅行";
      await setDoc(doc(db,...TRIPS_PATH,c), {
        tripName: tripName, homeCurrency: "TWD", rates: {}, members: [name], created: Date.now(), settledTransfers: {}
      });
      enterTrip(c, name, tripName, "members");
    } catch(e){ U.lobbyErr="建立失敗:"+(e.code||e.message); U.lobbyBusy=false; render(); }
  },
  async joinTrip(targetCode = null){
    const name = U.lobbyName.trim();
    const c = (targetCode || U.lobbyCode).trim().toUpperCase();
    if (!name){ U.lobbyErr="請先輸入你的名字"; render(); return; }
    if (!c){ U.lobbyErr="請輸入旅程代碼"; render(); return; }
    U.lobbyBusy=true; U.lobbyErr=""; render();
    try {
      const snap = await getDoc(doc(db,...TRIPS_PATH,c));
      if (!snap.exists()){ U.lobbyErr=`找不到代碼 ${c} 的旅程,請確認代碼。`; U.lobbyBusy=false; render(); return; }
      const data = snap.data();
      if (!data.members.includes(name)) await updateDoc(doc(db,...TRIPS_PATH,c), { members: arrayUnion(name) });
      enterTrip(c, name, data.tripName, "expenses");
    } catch(e){ U.lobbyErr="加入失敗:"+(e.code||e.message); U.lobbyBusy=false; render(); }
  },
  leaveTripPrompt(){ 
    Modal.show("離開旅程", "要離開這個旅程嗎？<br><small>資料還在，之後用代碼可以再加入。</small>", "離開", () => leaveTrip());
  },
  
  async deleteTripPrompt(){
    Modal.show("刪除旅程", "<strong style='color:var(--red)'>警告：此動作無法復原！</strong><br>將刪除整個旅程、所有人名單與所有帳目。", "確認刪除", async () => {
      try {
        const batch = writeBatch(db);
        const expDocs = await getDocs(expCol());
        expDocs.forEach(d => batch.delete(d.ref));
        batch.delete(tripRef());
        await batch.commit();
        
        // 移除本地歷史
        U.history = U.history.filter(h => h.code !== code);
        localStorage.setItem(HISTORY_KEY, JSON.stringify(U.history));
        leaveTrip(true);
      } catch(e) { alert("刪除失敗:" + e.message); }
    }, true);
  },
  shareToLine(){
    const text = `邀請你加入「${meta.tripName}」一起記帳！\n代碼：${code}\n網址：${location.href}`;
    window.open(`https://line.me/R/msg/text/?${encodeURIComponent(text)}`, '_blank');
  },
  
  setLobbyName(v){ U.lobbyName=v; }, setLobbyTrip(v){ U.lobbyTrip=v; }, setLobbyCode(v){ U.lobbyCode=v.toUpperCase(); },
  setNewMember(v){ U.newMember=v; }, setNewCode(v){ U.newCode=v.toUpperCase(); }, setNewRate(v){ U.newRate=v; },

  async addMember(){
    const n = U.newMember.trim();
    if (!n || members().includes(n)) return;
    U.newMember="";
    try { await updateDoc(tripRef(), { members: arrayUnion(n) }); U.sharers.push(n); }
    catch(e){ alert("儲存失敗,請再試一次。"); }
  },
  async removeMember(n){
    if (expenses.some(e=>e.payer===n||e.sharers.includes(n))){
      Modal.show("無法移除", `「${n}」已經有帳目紀錄,請先刪除相關帳目再移除成員。`, "了解", ()=>{}); return;
    }
    if (n===myName){ Modal.show("無法移除", "不能移除自己,請改用「離開旅程」。", "了解", ()=>{}); return; }
    try { await updateDoc(tripRef(), { members: arrayRemove(n) }); } catch(e){ alert("儲存失敗,請再試一次。"); }
  },
  
  saveTripName(v){ if (v.trim() && v!==meta.tripName) updateDoc(tripRef(),{tripName:v.trim()}).catch(()=>{}); },
  setHome(v){
    const h = v.toUpperCase().slice(0,5).trim();
    if (h && h!==homeCur()) updateDoc(tripRef(),{homeCurrency:h}).catch(()=>alert("儲存失敗"));
  },
  toggleRates(){ U.showRates=!U.showRates; render(); },
  addRate(){
    const c = U.newCode.trim().toUpperCase(), r = parseFloat(U.newRate);
    if (!c || !(r>0) || c===homeCur()) return;
    U.newCode=""; U.newRate="";
    updateDoc(tripRef(),{[`rates.${c}`]:r}).catch(()=>alert("儲存失敗"));
  },
  removeRate(c){
    if (expenses.some(e=>e.currency===c)){ Modal.show("無法刪除", `已有帳目使用 ${c}，可直接修改匯率。`, "了解", ()=>{}); return; }
    updateDoc(tripRef(),{[`rates.${c}`]:deleteField()}).catch(()=>alert("刪除失敗"));
  },
  
  toggleSharer(m){ U.sharers = U.sharers.includes(m) ? U.sharers.filter(x=>x!==m) : [...U.sharers,m]; render(); },
  toggleAll(){ U.sharers = U.sharers.length===members().length ? [] : [...members()]; render(); },
  setMode(m){ U.splitMode=m; render(); },
  setShare(m,v){ U.customShares[m]=v; refreshHints(); },
  fillRemain(m){
    const amt = parseFloat(U.amount)||0;
    const others = U.sharers.filter(x=>x!==m).reduce((s,x)=>s+(parseFloat(U.customShares[x])||0),0);
    const remain = Math.round((amt-others)*100)/100;
    if (remain>=0){ U.customShares[m]=String(remain); render(); }
  },
  
  editExpense(id){
    const e = expenses.find(x => x._docId === id);
    if(!e) return;
    U.editingId = id;
    U.desc = e.desc; U.amount = String(e.amount); U.currency = e.currency;
    U.payer = e.payer; U.sharers = [...e.sharers]; U.splitMode = e.splitMode;
    U.customShares = e.customShares ? {...e.customShares} : {};
    U.date = e.rawDate || getToday();
    U.tab = "expenses";
    window.scrollTo({ top: 0, behavior: 'smooth' });
    render();
  },
  cancelEdit(){
    U.editingId = null;
    U.desc=""; U.amount=""; U.customShares={}; U.date=getToday();
    render();
  },
  
  async saveExpense(){
    const v = validate();
    if (!v.ok) return;
    const isEdit = !!U.editingId;
    const id = isEdit ? expenses.find(x=>x._docId===U.editingId).id : Date.now();
    const docId = isEdit ? U.editingId : `${id}-${Math.random().toString(36).slice(2,6)}`;
    
    // 轉換格式 YYYY-MM-DD -> MM/DD
    const dParts = U.date.split('-');
    const displayDate = dParts.length === 3 ? `${parseInt(dParts[1])}/${parseInt(dParts[2])}` : U.date;

    const exp = {
      id, desc:U.desc.trim(), amount:v.amt, currency:U.currency, rate:rateOf(U.currency),
      payer:U.payer, sharers:[...U.sharers], splitMode:U.splitMode,
      customShares: U.splitMode==="custom" ? Object.fromEntries(U.sharers.map(m=>[m,parseFloat(U.customShares[m])||0])) : null,
      by: myName, date: displayDate, rawDate: U.date
    };
    
    try {
      if (isEdit) await updateDoc(doc(expCol(), docId), exp);
      else await setDoc(doc(expCol(), docId), exp);
      A.cancelEdit();
    } catch(e){ alert("儲存失敗,請檢查網路後再試一次。"); }
  },
  
  removeExpensePrompt(docSnapId){
    Modal.show("刪除帳目", "確定要刪除這筆帳目嗎？", "刪除", async () => {
      try { 
        await deleteDoc(doc(expCol(), docSnapId)); 
        if(U.editingId === docSnapId) A.cancelEdit();
      } catch(e){ alert("刪除失敗,請再試一次。"); }
    }, true);
  },
  
  async toggleSettle(key) {
    const current = settledMap()[key] || false;
    try {
      await updateDoc(tripRef(), { [`settledTransfers.${key}`]: !current });
    } catch(e) { console.log(e); }
  }
};

function saveToHistory(c, n, tName) {
  U.history = U.history.filter(h => h.code !== c);
  U.history.unshift({ code: c, name: n, tripName: tName, time: Date.now() });
  if (U.history.length > 5) U.history.pop();
  localStorage.setItem(HISTORY_KEY, JSON.stringify(U.history));
}

function enterTrip(c, name, tripName, tab){
  code = c; myName = name;
  try { localStorage.setItem(SESSION_KEY, JSON.stringify({code:c, name, tripName})); } catch(e){}
  saveToHistory(c, name, tripName);
  U.screen="trip"; U.tab=tab; U.payer=name; U.lobbyBusy=false; U.editingId=null;
  meta=null; expenses=[]; U.date=getToday();
  attachListeners();
  render();
}
function leaveTrip(silent){
  detachListeners();
  try { localStorage.removeItem(SESSION_KEY); } catch(e){}
  code=""; myName=""; meta=null; expenses=[]; U.editingId=null;
  U.screen="lobby"; U.lobbyCode=""; U.lobbyErr=""; U.sharers=[]; U.payer="";
  render();
}

function validate(){
  const amt = parseFloat(U.amount)||0;
  const base = U.desc.trim() && amt>0 && U.payer && U.sharers.length>0 && rateOf(U.currency)>0;
  if (U.splitMode==="equal") return {ok:!!base, amt};
  const sum = U.sharers.reduce((s,m)=>s+(parseFloat(U.customShares[m])||0),0);
  const diff = Math.round((amt-sum)*100)/100;
  return {ok: !!base && Math.abs(diff)<0.01, amt, sum, diff};
}

  if (U.screen!=="trip") return;
  const {bal, transfers, total} = calc();
  refreshSyncbar();
  
  const hm = document.getElementById("hdr-meta");
  if (hm) hm.innerHTML = `<span>${esc(myName)} · ${members().length} 位成員 · ${expenses.length} 筆帳</span><span class="num">總額 ${fmt(total)} ${esc(homeCur())}</span>`;

  if (badge) badge.outerHTML = settleBadge(transfers.length);

  if (el) el.innerHTML = expListHtml();

function refreshSyncbar(){
  const s = document.getElementById("sync-status");
  if (!s) return;
  s.className = "status " + (syncErr?"err":live?"live":"");
  s.textContent = syncErr ? "⚠ 連線中斷,恢復網路後會自動同步" : live ? "● 即時同步中" : "連線中⋯";
}
function refreshHints(){
  const v = validate();
  const btn = document.getElementById("add-btn");
  if (btn) btn.disabled = !v.ok;
  const amt = parseFloat(U.amount)||0;
  
  const conv = document.getElementById("convert-hint");
  if (conv){
    if (U.currency!==homeCur() && amt>0){
      conv.style.display="";
      conv.textContent = `≈ ${fmt(amt*rateOf(U.currency))} ${homeCur()}(匯率 ${rateOf(U.currency)})`;
    } else conv.style.display="none";
  }
  
  const eq = document.getElementById("equal-hint");
  if (eq){
    if (U.splitMode==="equal" && U.sharers.length>0 && amt>0){
      eq.style.display="";
      eq.textContent = `每人分攤 ${fmt(amt/U.sharers.length)} ${U.currency}` +
        (U.currency!==homeCur() ? ` ≈ ${fmt(amt/U.sharers.length*rateOf(U.currency))} ${homeCur()}` : "");
    } else eq.style.display="none";
  }
  
  const ck = document.getElementById("custom-check");
  if (ck && U.splitMode==="custom"){
    if (amt>0){
      ck.style.display="";
      ck.className = "check num " + (v.ok?"ok":"bad");
      ck.textContent = v.ok ? `✓ 合計 ${fmt(v.sum)} ${U.currency},剛好等於總金額`
        : v.diff>0 ? `還差 ${fmt(v.diff)} ${U.currency} 未分配` : `超出總金額 ${fmt(-v.diff)} ${U.currency}`;
    } else ck.style.display="none";
  }
}

          </div>`).join("")}
        <div class="row">
          <input class="field" style="width:76px;padding:8px 10px;text-transform:uppercase" placeholder="幣別" value="${esc(U.newCode)}" oninput="A.setNewCode(this.value)">
          <input class="field num" style="flex:1;padding:8px 10px" type="number" min="0" step="any" inputmode="decimal" placeholder="匯率" value="${esc(U.newRate)}" oninput="A.setNewRate(this.value)">
          <button class="btn small" onclick="A.addRate()">新增</button>
        </div>
      </div>`;
    }
    html += `</div>

    <div class="card" style="border: ${isEdit ? '2px solid var(--amber)' : 'none'}; position: relative;">
      ${isEdit ? '<div style="position:absolute; top:-12px; left:12px; background:var(--amber); color:white; font-size:11px; padding:2px 8px; border-radius:10px; font-weight:700;">編輯中</div>' : ''}
      <div class="row" style="margin-bottom:10px">
        <input class="field" style="flex:1.6" placeholder="項目,例如:晚餐" value="${esc(U.desc)}" oninput="A.input('desc',this.value)">
        <input class="field num" style="flex:1;min-width:70px" type="number" min="0" inputmode="decimal" placeholder="金額" value="${esc(U.amount)}" oninput="A.input('amount',this.value)">
        <select class="field num" style="width:84px;padding:10px 6px" onchange="A.inputRe('currency',this.value)">
          ${currencyList.map(c=>`<option value="${esc(c)}" ${c===U.currency?"selected":""}>${esc(c)}</option>`).join("")}
        </select>
      </div>
      <div class="convert num" id="convert-hint" style="display:${U.currency!==homeCur()&&amt>0?"":"none"}">
        ≈ ${fmt(amt*rateOf(U.currency))} ${H}(匯率 ${rateOf(U.currency)})
      </div>
      
      <div class="row" style="margin-bottom:10px">
        <div style="flex:1">
          <label class="label">誰付的錢</label>
          <select class="field" style="width:100%" id="payer-select" onchange="A.input('payer',this.value)">
            <option value="" disabled ${!U.payer?"selected":""}>選擇付款人</option>
            ${members().map(m=>`<option value="${esc(m)}" ${m===U.payer?"selected":""}>${esc(m)}${m===myName?"(我)":""}</option>`).join("")}
          </select>
        </div>
        <div style="width:130px">
          <label class="label">日期</label>
          <input type="date" class="field num" style="width:100%; padding:9px;" value="${esc(U.date)}" onchange="A.input('date',this.value)">
        </div>
      </div>
      
      <div style="margin-bottom:12px">
        <label class="label" style="margin-bottom:6px">誰要分攤(點選切換)
          <button class="link" style="margin-left:8px" onclick="A.toggleAll()">${U.sharers.length===members().length?"全部取消":"全選"}</button>
        </label>
        <div class="row" style="flex-wrap:wrap;gap:6px" id="sharer-chips">${chipsHtml()}</div>
      </div>
      
      <div style="margin-bottom:12px">
        <div class="row" style="gap:6px;margin-bottom:8px">
          <button class="mode ${U.splitMode==="equal"?"on":""}" onclick="A.setMode('equal')">平均分攤</button>
          <button class="mode ${U.splitMode==="custom"?"on":""}" onclick="A.setMode('custom')">自訂金額</button>
        </div>`;
        
    if (U.splitMode==="equal"){
      html += `<div class="num" id="equal-hint" style="font-size:12px;color:var(--muted);display:${U.sharers.length&&amt>0?"":"none"}">
        每人分攤 ${U.sharers.length?fmt(amt/U.sharers.length):0} ${esc(U.currency)}${
          U.currency!==homeCur()&&U.sharers.length?` ≈ ${fmt(amt/U.sharers.length*rateOf(U.currency))} ${H}`:""}</div>`;
    } else {
      if (!U.sharers.length){
        html += `<div style="font-size:12.5px;color:var(--faint)">先在上面選好要分攤的人。</div>`;
      } else {
        html += U.sharers.map(m=>`
          <div class="row" style="margin-bottom:6px">
            <span style="font-size:14px;width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(m)}</span>
            <input class="field num" style="flex:1;padding:8px 10px" type="number" min="0" step="any" inputmode="decimal" placeholder="0" value="${esc(U.customShares[m]??"")}" oninput="A.setShare('${esc(m)}',this.value)">
            <span style="font-size:12px;color:var(--faint)">${esc(U.currency)}</span>
            <button class="fill-btn" title="填入剩餘金額" onclick="A.fillRemain('${esc(m)}')">補齊</button>
          </div>`).join("");
        html += `<div class="check num ${v.ok?"ok":"bad"}" id="custom-check" style="display:${amt>0?"":"none"}"></div>`;
      }
    }
    
    html += `</div>
      <div class="row">
        ${isEdit ? `<button class="btn big ghost" style="flex:1" onclick="A.cancelEdit()">取消</button>` : ''}
        <button class="btn big ${isEdit ? 'edit-mode' : ''}" style="flex:2" id="add-btn" ${v.ok?"":"disabled"} onclick="A.saveExpense()">
          ${isEdit ? "儲存修改" : "記一筆"}
        </button>
      </div>
    </div>
    <div id="exp-list">${expListHtml()}</div>`;
  }

  if (U.tab==="settle"){
    html += expenses.length
      ? `<div id="settle-box">${settleHtml(bal, transfers, total)}</div>`
      : `<p class="empty">先記幾筆帳,結算結果會出現在這裡。</p>`;
  }

  html += `</div>`;
  $app.innerHTML = html;
  if(U.tab === "expenses") refreshHints();
}

onAuthStateChanged(auth, async (user) => {
  if (!user) return;
  try {
    const s = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
    if (s && s.code && s.name) {
      const snap = await getDoc(doc(db, ...TRIPS_PATH, s.code));
      if (snap.exists()) { enterTrip(s.code, s.name, s.tripName || snap.data().tripName, "expenses"); return; }
      localStorage.removeItem(SESSION_KEY);
    }
  } catch(e){}
  U.screen = "lobby";
  render();
});

signInAnonymously(auth).catch(e => {
  $app.innerHTML = `<div class="setup">
    <h2 style="color:var(--red)">無法連線到 Firebase</h2>
    <p>錯誤:<code>${esc(e.code||e.message)}</code></p>
  </div>`;
});
</script>
</body>
</html>
