<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0E5A54">
<title>旅費分帳</title>
<style>
  :root{
    --bg:#EEF2F0; --ink:#16302B; --teal:#0E5A54; --teal-soft:#DDEBE8;
    --amber:#E8A33D; --amber-soft:#FBEED6; --red:#C4543A;
    --paper:#FDFDFB; --line:#D5DEDB; --muted:#5E716C; --faint:#8B9A95;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;font-size:15px}
  .wrap{max-width:460px;margin:0 auto;padding:20px 16px 48px}
  input,select,button{font-family:inherit;font-size:15px}
  input:focus,select:focus{outline:2px solid var(--teal);outline-offset:1px}
  button:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
  .num{font-variant-numeric:tabular-nums;font-family:'SF Mono','Cascadia Mono',Consolas,monospace}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  .ticket{background:var(--teal);color:var(--paper);border-radius:14px;
    padding:18px 20px 14px;margin-bottom:10px;position:relative;overflow:hidden}
  .ticket .eyebrow{display:flex;justify-content:space-between;font-size:11px;letter-spacing:.2em;opacity:.8;margin-bottom:4px}
  .ticket input.trip-name{background:transparent;border:none;color:var(--paper);
    font-size:22px;font-weight:700;width:100%;padding:0}
  .ticket .meta{display:flex;justify-content:space-between;margin-top:10px;font-size:13px;opacity:.9}
  .ticket .hole{position:absolute;top:50%;width:16px;height:16px;border-radius:8px;background:var(--bg)}
  .ticket .hole.l{left:-8px}.ticket .hole.r{right:-8px}

  .syncbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:0 4px}
  .syncbar .status{font-size:11.5px;color:var(--faint)}
  .syncbar .status.err{color:var(--red)}
  .syncbar .status.live{color:var(--teal);font-weight:600}

  nav{display:flex;gap:6px;margin-bottom:16px}
  nav button{flex:1;padding:10px 0;border-radius:10px;border:none;cursor:pointer;
    font-weight:600;background:var(--paper);color:var(--ink);box-shadow:0 1px 2px rgba(22,48,43,.08)}
  nav button.on{background:var(--ink);color:var(--paper);box-shadow:none}
  nav .badge{margin-left:5px;background:var(--amber);color:var(--ink);border-radius:8px;padding:1px 7px;font-size:12px}

  .card{background:var(--paper);border-radius:12px;padding:16px;margin-bottom:16px;
    box-shadow:0 1px 3px rgba(22,48,43,.08)}
  .row{display:flex;gap:8px;align-items:center}
  .field{padding:10px 12px;border-radius:9px;border:1px solid var(--line);background:#fff;min-width:0}
  .btn{padding:0 20px;border-radius:10px;border:none;background:var(--teal);
    color:var(--paper);font-weight:700;cursor:pointer}
  .btn.small{padding:8px 14px;font-size:13px;border-radius:9px}
  .btn.big{width:100%;padding:12px 0;border-radius:10px}
  .btn.ghost{background:transparent;border:1.5px solid var(--teal);color:var(--teal)}
  .btn:disabled{background:#C7D4D0;cursor:default;border:none;color:var(--paper)}
  .label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px}
  .link{border:none;background:transparent;color:var(--teal);cursor:pointer;
    font-size:12px;text-decoration:underline;padding:0}
  .x{border:none;background:transparent;color:#A3B2AD;cursor:pointer;font-size:17px;line-height:1;padding:2px 4px}
  .empty{text-align:center;color:#6B7E79;padding:40px 0;font-size:14px}
  .errbox{margin-top:14px;background:#F9E3DC;color:var(--red);border-radius:9px;
    padding:10px 14px;font-size:13.5px;font-weight:600}

  .chip{padding:7px 14px;border-radius:999px;cursor:pointer;font-size:13px;font-weight:600;
    border:1.5px solid var(--line);background:transparent;color:var(--faint)}
  .chip.on{border-color:var(--teal);background:var(--teal-soft);color:var(--teal)}
  .mode{flex:1;padding:8px 0;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;
    border:1.5px solid var(--line);background:transparent;color:var(--faint)}
  .mode.on{border-color:var(--teal);background:var(--teal);color:var(--paper)}

  .item{background:var(--paper);border-radius:10px;padding:12px 14px;margin-bottom:8px;
    box-shadow:0 1px 2px rgba(22,48,43,.06)}
  .pos{color:var(--teal)} .neg{color:var(--red)} .zero{color:var(--faint)}

  .rates{background:var(--amber-soft);border-radius:12px;padding:12px 14px;margin-bottom:12px}
  .invite{background:var(--amber-soft);border-radius:12px;padding:14px 16px;margin-bottom:14px;text-align:center}
  .invite .code{font-size:28px;font-weight:800;letter-spacing:.35em;color:var(--ink)}
  .hint{font-size:11.5px;color:var(--faint);margin-top:8px}
  .convert{font-size:12.5px;color:var(--teal);margin-bottom:10px;background:var(--teal-soft);
    border-radius:7px;padding:6px 10px}
  .check{font-size:12.5px;margin-top:6px;border-radius:7px;padding:7px 10px;font-weight:600}
  .check.ok{background:var(--teal-soft);color:var(--teal)}
  .check.bad{background:#F9E3DC;color:var(--red)}
  .fill-btn{border:1px solid var(--line);background:transparent;color:var(--teal);cursor:pointer;
    font-size:11.5px;border-radius:7px;padding:5px 8px;white-space:nowrap}

  .receipt{background:var(--paper);padding:22px 20px 26px;box-shadow:0 2px 8px rgba(22,48,43,.1);
    -webkit-mask:linear-gradient(#000 0 0) top/100% calc(100% - 8px) no-repeat,
      radial-gradient(circle at 8px 0,transparent 8px,#000 8px) bottom/16px 8px repeat-x;
    mask:linear-gradient(#000 0 0) top/100% calc(100% - 8px) no-repeat,
      radial-gradient(circle at 8px 0,transparent 8px,#000 8px) bottom/16px 8px repeat-x}
  .receipt .head{text-align:center;border-bottom:1.5px dashed var(--line);padding-bottom:14px;margin-bottom:14px}
  .receipt .sect{font-size:12px;color:var(--faint);margin-bottom:8px}
  .balrow{display:flex;justify-content:space-between;padding:5px 0;font-size:14.5px}
  .transfer{display:flex;justify-content:space-between;align-items:center;
    background:var(--teal-soft);border-radius:9px;padding:11px 14px;margin-bottom:8px}
  .transfer.mine{background:var(--amber-soft)}
  .foot{text-align:center;margin-top:16px;font-size:11px;letter-spacing:.2em;color:#A3B2AD}

  .center-screen{min-height:100vh;display:grid;place-items:center;color:var(--teal)}
  .setup{max-width:520px;margin:0 auto;padding:40px 20px;line-height:1.8}
  .setup code{background:#E3E9E7;border-radius:5px;padding:2px 6px;font-size:13px}
</style>
</head>
<body>
<div id="app"><div class="center-screen">載入中⋯</div></div>

<script type="module">
// ╔══════════════════════════════════════════════════════════╗
// ║  第 1 步:把你的 Firebase 設定貼在下面(部署教學有說明)   ║
// ╚══════════════════════════════════════════════════════════╝
const firebaseConfig = {
  apiKey: "AIzaSyAopkJDsw7UoLRuoQQIM7pQskAvvbev294",
  authDomain: "trip-split-e9535.firebaseapp.com",
  projectId: "trip-split-e9535",
  storageBucket: "trip-split-e9535.firebasestorage.app",
  messagingSenderId: "569232089168",
  appId: "1:569232089168:web:4c1534daca8005ac61b155",
};
// ══════════════════════════════════════════════════════════

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, collection,
  onSnapshot, arrayUnion, arrayRemove, deleteField
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const $app = document.getElementById("app");
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt = n => {
  const r = Math.round(n*100)/100;
  return Number.isInteger(r) ? r.toLocaleString()
    : r.toLocaleString(undefined,{minimumFractionDigits:1,maximumFractionDigits:2});
};

// ── 尚未貼設定:顯示提示畫面 ──
if (firebaseConfig.apiKey.startsWith("貼上")) {
  $app.innerHTML = `<div class="setup">
    <h2 style="color:var(--teal)">還差一步:貼上 Firebase 設定</h2>
    <p>這個檔案需要連到你自己的 Firebase 專案才能運作。請打開本檔案,找到最上方的
    <code>firebaseConfig</code> 區塊,把 Firebase 控制台給你的設定貼進去。</p>
    <p>完整步驟請看附上的「<b>部署教學.md</b>」,照著做約 20 分鐘就能上線。</p>
  </div>`;
  throw new Error("Firebase config not set");
}

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

// ═══════════ 狀態 ═══════════
const COMMON = ["JPY","USD","KRW","EUR","THB","VND","CNY","HKD","SGD","GBP","AUD"];
const SESSION_KEY = "trip-split-session";
let code = "", myName = "";
let meta = null;                 // {tripName, homeCurrency, rates, members}
let expenses = [];
let unsubMeta = null, unsubExp = null;
let live = false, syncErr = false;

let U = {                        // UI 暫存(不同步)
  screen:"loading", tab:"expenses", showRates:false,
  desc:"", amount:"", currency:"TWD", payer:"", sharers:[],
  splitMode:"equal", customShares:{}, newMember:"",
  newCode:"", newRate:"", lobbyName:"", lobbyCode:"", lobbyTrip:"", lobbyErr:"", lobbyBusy:false,
};

const members = () => meta?.members || [];
const homeCur = () => meta?.homeCurrency || "TWD";
const rates = () => meta?.rates || {};
const rateOf = c => c === homeCur() ? 1 : (rates()[c] || 0);
const tripRef = () => doc(db, "trips", code);
const expCol = () => collection(db, "trips", code, "expenses");

const genCode = () => {
  const chars = "ABCDEFGHJKMNPQRSTUVWXYZ23456789";
  let s = "";
  const a = new Uint32Array(6); crypto.getRandomValues(a);
  for (let i = 0; i < 6; i++) s += chars[a[i] % chars.length];
  return s;
};

// ═══════════ 即時監聽 ═══════════
function attachListeners() {
  detachListeners();
  unsubMeta = onSnapshot(tripRef(), snap => {
    if (!snap.exists()) { alert("這個旅程已被刪除。"); leaveTrip(true); return; }
    meta = snap.data();
    if (!members().includes(U.payer)) U.payer = members().includes(myName) ? myName : "";
    U.sharers = U.sharers.filter(m => members().includes(m));
    if (U.currency !== homeCur() && !rates()[U.currency]) U.currency = homeCur();
    live = true; syncErr = false;
    refreshData();
  }, () => { syncErr = true; live = false; refreshSyncbar(); });

  unsubExp = onSnapshot(expCol(), snap => {
    expenses = snap.docs.map(d => ({...d.data(), _docId: d.id})).sort((a,b) => b.id - a.id);
    live = true; syncErr = false;
    refreshData();
  }, () => { syncErr = true; live = false; refreshSyncbar(); });
}
function detachListeners(){
  if (unsubMeta) unsubMeta(); if (unsubExp) unsubExp();
  unsubMeta = unsubExp = null; live = false;
}

// ═══════════ 結算計算 ═══════════
function calc(){
  const bal = Object.fromEntries(members().map(m=>[m,0]));
  let total = 0;
  for (const e of expenses){
    const rate = e.rate || 1, home = e.amount * rate;
    total += home;
    if (bal[e.payer] !== undefined) bal[e.payer] += home;
    if (e.splitMode === "custom" && e.customShares){
      for (const [m,v] of Object.entries(e.customShares))
        if (bal[m] !== undefined) bal[m] -= v * rate;
    } else {
      const share = home / e.sharers.length;
      for (const s of e.sharers) if (bal[s] !== undefined) bal[s] -= share;
    }
  }
  const debtors=[], creditors=[];
  for (const [m,v] of Object.entries(bal)){
    if (v < -0.01) debtors.push({m,v:-v});
    else if (v > 0.01) creditors.push({m,v});
  }
  debtors.sort((a,b)=>b.v-a.v); creditors.sort((a,b)=>b.v-a.v);
  const transfers=[]; let i=0,j=0;
  while (i<debtors.length && j<creditors.length){
    const pay = Math.min(debtors[i].v, creditors[j].v);
    transfers.push({from:debtors[i].m, to:creditors[j].m, amount:pay});
    debtors[i].v -= pay; creditors[j].v -= pay;
    if (debtors[i].v < 0.01) i++;
    if (creditors[j].v < 0.01) j++;
  }
  return {bal, transfers, total};
}
const balClass = v => v>0.01?"pos":v<-0.01?"neg":"zero";

// ═══════════ 動作 ═══════════
const A = window.A = {
  setTab(t){ U.tab=t; render(); },
  input(k,v){ U[k]=v; refreshHints(); },
  inputRe(k,v){ U[k]=v; render(); },

  // ── 大廳 ──
  async createTrip(){
    const name = U.lobbyName.trim();
    if (!name){ U.lobbyErr="請先輸入你的名字"; render(); return; }
    U.lobbyBusy=true; U.lobbyErr=""; render();
    try {
      let c = genCode();
      for (let i=0;i<3;i++){
        if (!(await getDoc(doc(db,"trips",c))).exists()) break;
        c = genCode();
      }
      await setDoc(doc(db,"trips",c), {
        tripName: U.lobbyTrip.trim() || "我們的旅行",
        homeCurrency: "TWD", rates: {}, members: [name], created: Date.now(),
      });
      enterTrip(c, name, "members");
    } catch(e){ U.lobbyErr="建立失敗:"+(e.code||e.message); U.lobbyBusy=false; render(); }
  },
  async joinTrip(){
    const name = U.lobbyName.trim();
    const c = U.lobbyCode.trim().toUpperCase();
    if (!name){ U.lobbyErr="請先輸入你的名字"; render(); return; }
    if (!c){ U.lobbyErr="請輸入旅程代碼"; render(); return; }
    U.lobbyBusy=true; U.lobbyErr=""; render();
    try {
      const snap = await getDoc(doc(db,"trips",c));
      if (!snap.exists()){ U.lobbyErr=`找不到代碼 ${c} 的旅程,請確認代碼。`; U.lobbyBusy=false; render(); return; }
      if (!snap.data().members.includes(name))
        await updateDoc(doc(db,"trips",c), { members: arrayUnion(name) });
      enterTrip(c, name, "expenses");
    } catch(e){ U.lobbyErr="加入失敗:"+(e.code||e.message); U.lobbyBusy=false; render(); }
  },
  leaveTrip(){ 
    if (confirm("要離開這個旅程嗎?(資料還在,之後用代碼可以再加入)")) leaveTrip(); 
  },

  // ── 成員 ──
  async addMember(){
    const n = U.newMember.trim();
    if (!n || members().includes(n)) return;
    U.newMember="";
    try { await updateDoc(tripRef(), { members: arrayUnion(n) }); U.sharers.push(n); }
    catch(e){ alert("儲存失敗,請再試一次。"); }
  },
  async removeMember(n){
    if (expenses.some(e=>e.payer===n||e.sharers.includes(n))){
      alert(`「${n}」已經有帳目紀錄,請先刪除相關帳目再移除成員。`); return;
    }
    if (n===myName){ alert("不能移除自己,請改用「離開旅程」。"); return; }
    try { await updateDoc(tripRef(), { members: arrayRemove(n) }); }
    catch(e){ alert("儲存失敗,請再試一次。"); }
  },
  keyMember(ev){ if (ev.key==="Enter") A.addMember(); },

  // ── 旅程設定 ──
  saveTripName(v){ if (v.trim() && v!==meta.tripName) updateDoc(tripRef(),{tripName:v.trim()}).catch(()=>{}); },
  setHome(v){
    const h = v.toUpperCase().slice(0,5).trim();
    if (h && h!==homeCur()) updateDoc(tripRef(),{homeCurrency:h}).catch(()=>alert("儲存失敗"));
  },
  toggleRates(){ U.showRates=!U.showRates; render(); },
  addRate(){
    const c = U.newCode.trim().toUpperCase(), r = parseFloat(U.newRate);
    if (!c || !(r>0) || c===homeCur()) return;
    U.newCode=""; U.newRate="";
    updateDoc(tripRef(),{[`rates.${c}`]:r}).catch(()=>alert("儲存失敗"));
  },
  setRate(c,v){
    const r = parseFloat(v);
    if (r>0) updateDoc(tripRef(),{[`rates.${c}`]:r}).catch(()=>{});
  },
  removeRate(c){
    if (expenses.some(e=>e.currency===c)){ alert(`已有帳目使用 ${c},無法刪除。可直接修改匯率。`); return; }
    updateDoc(tripRef(),{[`rates.${c}`]:deleteField()}).catch(()=>alert("刪除失敗"));
  },

  // ── 記帳 ──
  toggleSharer(m){
    U.sharers = U.sharers.includes(m) ? U.sharers.filter(x=>x!==m) : [...U.sharers,m];
    render();
  },
  toggleAll(){
    U.sharers = U.sharers.length===members().length ? [] : [...members()];
    render();
  },
  setMode(m){ U.splitMode=m; render(); },
  setShare(m,v){ U.customShares[m]=v; refreshHints(); },
  fillRemain(m){
    const amt = parseFloat(U.amount)||0;
    const others = U.sharers.filter(x=>x!==m).reduce((s,x)=>s+(parseFloat(U.customShares[x])||0),0);
    const remain = Math.round((amt-others)*100)/100;
    if (remain>=0){ U.customShares[m]=String(remain); render(); }
  },
  async addExpense(){
    const v = validate();
    if (!v.ok) return;
    const id = Date.now();
    const docId = `${id}-${Math.random().toString(36).slice(2,6)}`;
    const exp = {
      id, desc:U.desc.trim(), amount:v.amt, currency:U.currency, rate:rateOf(U.currency),
      payer:U.payer, sharers:[...U.sharers], splitMode:U.splitMode,
      customShares: U.splitMode==="custom"
        ? Object.fromEntries(U.sharers.map(m=>[m,parseFloat(U.customShares[m])||0])) : null,
      by: myName,
      date: new Date().toLocaleDateString("zh-TW",{month:"numeric",day:"numeric"}),
    };
    try {
      await setDoc(doc(expCol(), docId), exp);
      U.desc=""; U.amount=""; U.customShares={};
      render();
    } catch(e){ alert("儲存失敗,請檢查網路後再試一次。"); }
  },
  async removeExpense(docSnapId){
    try { await deleteDoc(doc(expCol(), docSnapId)); }
    catch(e){ alert("刪除失敗,請再試一次。"); }
  },
};

function enterTrip(c, name, tab){
  code = c; myName = name;
  try { localStorage.setItem(SESSION_KEY, JSON.stringify({code:c, name})); } catch(e){}
  U.screen="trip"; U.tab=tab; U.payer=name; U.lobbyBusy=false;
  meta=null; expenses=[];
  attachListeners();
  render();
}
function leaveTrip(silent){
  detachListeners();
  try { localStorage.removeItem(SESSION_KEY); } catch(e){}
  code=""; myName=""; meta=null; expenses=[];
  U.screen="lobby"; U.lobbyCode=""; U.lobbyErr=""; U.sharers=[]; U.payer="";
  render();
}

function validate(){
  const amt = parseFloat(U.amount)||0;
  const base = U.desc.trim() && amt>0 && U.payer && U.sharers.length>0 && rateOf(U.currency)>0;
  if (U.splitMode==="equal") return {ok:!!base, amt};
  const sum = U.sharers.reduce((s,m)=>s+(parseFloat(U.customShares[m])||0),0);
  const diff = Math.round((amt-sum)*100)/100;
  return {ok: !!base && Math.abs(diff)<0.01, amt, sum, diff};
}

// ═══════════ 渲染 ═══════════
// 資料異動時只更新資料區塊,不重建表單(避免打字被中斷)
function refreshData(){
  if (U.screen!=="trip") return;
  const {bal, transfers, total} = calc();
  refreshSyncbar();
  const hm = document.getElementById("hdr-meta");
  if (hm) hm.innerHTML = `<span>${esc(myName)} · ${members().length} 位成員 · ${expenses.length} 筆帳</span>
    <span class="num">總額 ${fmt(total)} ${esc(homeCur())}</span>`;
  const badge = document.getElementById("settle-badge");
  if (badge) badge.outerHTML = settleBadge(transfers.length);
  const ml = document.getElementById("member-list");
  if (ml) ml.innerHTML = memberListHtml(bal);
  const el = document.getElementById("exp-list");
  if (el) el.innerHTML = expListHtml();
  const sb = document.getElementById("settle-box");
  if (sb) sb.innerHTML = settleHtml(bal, transfers, total);
  const chips = document.getElementById("sharer-chips");
  if (chips) chips.innerHTML = chipsHtml();
  const ps = document.getElementById("payer-select");
  if (ps){
    ps.innerHTML = `<option value="" disabled ${!U.payer?"selected":""}>選擇付款人</option>` +
      members().map(m=>`<option value="${esc(m)}" ${m===U.payer?"selected":""}>${esc(m)}${m===myName?"(我)":""}</option>`).join("");
  }
  refreshHints();
}
function refreshSyncbar(){
  const s = document.getElementById("sync-status");
  if (!s) return;
  s.className = "status " + (syncErr?"err":live?"live":"");
  s.textContent = syncErr ? "⚠ 連線中斷,恢復網路後會自動同步" : live ? "● 即時同步中" : "連線中⋯";
}
function refreshHints(){
  const v = validate();
  const btn = document.getElementById("add-btn");
  if (btn) btn.disabled = !v.ok;
  const amt = parseFloat(U.amount)||0;
  const conv = document.getElementById("convert-hint");
  if (conv){
    if (U.currency!==homeCur() && amt>0){
      conv.style.display="";
      conv.textContent = `≈ ${fmt(amt*rateOf(U.currency))} ${homeCur()}(匯率 ${rateOf(U.currency)})`;
    } else conv.style.display="none";
  }
  const eq = document.getElementById("equal-hint");
  if (eq){
    if (U.splitMode==="equal" && U.sharers.length>0 && amt>0){
      eq.style.display="";
      eq.textContent = `每人分攤 ${fmt(amt/U.sharers.length)} ${U.currency}` +
        (U.currency!==homeCur() ? ` ≈ ${fmt(amt/U.sharers.length*rateOf(U.currency))} ${homeCur()}` : "");
    } else eq.style.display="none";
  }
  const ck = document.getElementById("custom-check");
  if (ck && U.splitMode==="custom"){
    if (amt>0){
      ck.style.display="";
      ck.className = "check num " + (v.ok?"ok":"bad");
      ck.textContent = v.ok
        ? `✓ 合計 ${fmt(v.sum)} ${U.currency},剛好等於總金額`
        : v.diff>0 ? `還差 ${fmt(v.diff)} ${U.currency} 未分配`
        : `超出總金額 ${fmt(-v.diff)} ${U.currency}`;
    } else ck.style.display="none";
  }
}

const settleBadge = n => `<span id="settle-badge">${n?`<span class="badge">${n}</span>`:""}</span>`;

function chipsHtml(){
  return members().map(m=>
    `<button class="chip ${U.sharers.includes(m)?"on":""}" onclick="A.toggleSharer('${esc(m)}')">${esc(m)}</button>`).join("");
}
function memberListHtml(bal){
  return members().map(m=>`
    <div class="item row" style="justify-content:space-between">
      <span style="font-weight:600">${esc(m)}${m===myName?'<span style="font-size:11px;color:var(--teal);margin-left:6px;font-weight:700">(我)</span>':""}</span>
      <span class="row" style="gap:12px">
        <span class="num ${balClass(bal[m])}" style="font-size:14px">${bal[m]>0.01?"+":""}${fmt(bal[m]||0)}</span>
        ${m!==myName?`<button class="x" aria-label="移除 ${esc(m)}" onclick="A.removeMember('${esc(m)}')">×</button>`:""}
      </span>
    </div>`).join("");
}
function expListHtml(){
  if (!expenses.length) return `<p class="empty" style="padding:24px 0">還沒有帳目。上面記下第一筆吧!</p>`;
  return expenses.map(e=>{
    const foreign = e.currency && e.currency!==homeCur();
    return `
    <div class="item">
      <div class="row" style="justify-content:space-between;align-items:baseline">
        <span style="font-weight:700">${esc(e.desc)}</span>
        <span style="text-align:right">
          <span class="num" style="font-weight:700;font-size:16px">${fmt(e.amount)} ${esc(e.currency||homeCur())}</span>
          ${foreign?`<div class="num" style="font-size:11.5px;color:var(--faint)">≈ ${fmt(e.amount*(e.rate||1))} ${esc(homeCur())}</div>`:""}
        </span>
      </div>
      <div class="row" style="justify-content:space-between;margin-top:4px;font-size:12.5px;color:var(--muted)">
        <span>${esc(e.date)} · <b style="color:var(--teal)">${esc(e.payer)}</b> 先付 · ${
          e.splitMode==="custom" ? `<span style="color:var(--amber);font-weight:700">自訂分攤</span>`
          : (e.sharers.length===members().length ? "全員均分" : esc(e.sharers.join("、"))+" 均分")
        }${e.by&&e.by!==e.payer?`<span style="color:var(--faint)"> · ${esc(e.by)} 記的</span>`:""}</span>
        <button class="x" style="font-size:15px" aria-label="刪除帳目" onclick="A.removeExpense('${esc(e._docId)}')">×</button>
      </div>
      ${e.splitMode==="custom"&&e.customShares?`
        <div class="num" style="font-size:12px;color:var(--muted);margin-top:5px;background:#F4F6F5;border-radius:7px;padding:6px 10px">
          ${Object.entries(e.customShares).map(([m,val])=>`${esc(m)} ${fmt(val)}`).join(" · ")}
        </div>`:""}
    </div>`;
  }).join("");
}
function settleHtml(bal, transfers, total){
  const H = esc(homeCur());
  return `
  <div class="receipt">
    <div class="head">
      <div style="font-size:11px;letter-spacing:.3em;color:var(--faint)">SETTLEMENT · 結算收據</div>
      <div style="font-weight:700;font-size:18px;margin-top:4px">${esc(meta?.tripName||"")} <span class="num" style="font-size:12px;color:var(--faint)">#${esc(code)}</span></div>
      <div class="num" style="font-size:13px;color:var(--muted);margin-top:2px">總支出 ${fmt(total)} ${H} · ${members().length} 人</div>
      ${Object.keys(rates()).length?`<div class="num" style="font-size:11px;color:#A3B2AD;margin-top:4px">
        匯率:${Object.entries(rates()).map(([c,r])=>`1 ${esc(c)} = ${r} ${H}`).join(" · ")}</div>`:""}
    </div>
    <div style="margin-bottom:16px">
      <div class="sect">各自的餘額(+ 是要收錢,− 是要付錢,單位 ${H})</div>
      ${members().map(m=>`
        <div class="balrow"><span>${esc(m)}${m===myName?'<span style="font-size:11px;color:var(--teal);margin-left:5px">(我)</span>':""}</span>
          <span class="num ${balClass(bal[m])}" style="font-weight:700">${bal[m]>0.01?"+":""}${fmt(bal[m])}</span>
        </div>`).join("")}
    </div>
    <div style="border-top:1.5px dashed var(--line);padding-top:14px">
      <div class="sect" style="margin-bottom:10px">照著轉帳就結清(${transfers.length} 筆,單位 ${H})</div>
      ${!transfers.length
        ? `<div style="text-align:center;padding:10px 0;color:var(--teal);font-weight:700">🎉 大家剛好都平了,不用轉帳!</div>`
        : transfers.map(t=>{
            const mine = t.from===myName || t.to===myName;
            return `<div class="transfer ${mine?"mine":""}">
              <span style="font-size:14.5px"><b>${esc(t.from)}</b> <span style="color:var(--muted)">轉給</span> <b>${esc(t.to)}</b>${
                mine?'<span style="font-size:11px;color:var(--amber);font-weight:700;margin-left:5px">與我有關</span>':""}</span>
              <span class="num" style="font-weight:800;color:var(--teal);font-size:16px">${fmt(t.amount)}</span>
            </div>`;
          }).join("")}
    </div>
    <div class="foot">─ 旅途愉快 · 帳目兩清 ─</div>
  </div>`;
}

function render(){
  // ── 大廳 ──
  if (U.screen==="lobby"){
    $app.innerHTML = `
    <div style="max-width:420px;margin:0 auto;padding:40px 20px">
      <header class="ticket" style="padding:22px 22px 18px;margin-bottom:20px">
        <div style="font-size:11px;letter-spacing:.25em;opacity:.75;margin-bottom:4px">TRIP SPLIT · 旅費分帳</div>
        <div style="font-size:24px;font-weight:700">多人同步記帳</div>
        <div style="font-size:13px;opacity:.85;margin-top:6px;line-height:1.6">
          一個人建立旅程拿到代碼,其他人輸入代碼加入。大家各自記帳,即時同步。
        </div>
        <div class="hole l"></div><div class="hole r"></div>
      </header>
      <div class="card" style="padding:18px;margin-bottom:14px">
        <label class="label">你的名字(記帳時顯示用)</label>
        <input class="field" style="width:100%" placeholder="例如:小明"
          value="${esc(U.lobbyName)}"A.setLobbyName(this.value)">
      </div>
      <div class="card" style="padding:18px;margin-bottom:14px">
        <div style="font-weight:700;margin-bottom:10px">🆕 建立新旅程</div>
        <input class="field" style="width:100%;margin-bottom:10px" placeholder="旅程名稱,例如:沖繩四天三夜"
          value="${esc(U.lobbyTrip)}"A.setLobbyTrip(this.value)">
        <button class="btn big" ${U.lobbyBusy?"disabled":""} onclick="A.createTrip()">${U.lobbyBusy?"處理中⋯":"建立旅程,取得代碼"}</button>
      </div>
      <div class="card" style="padding:18px">
        <div style="font-weight:700;margin-bottom:10px">🔑 加入朋友的旅程</div>
        <input class="field num" style="width:100%;margin-bottom:10px;letter-spacing:.3em;text-align:center;font-size:18px;text-transform:uppercase"
          placeholder="輸入 6 碼旅程代碼" maxlength="6"
          value="${esc(U.lobbyCode)}"A.setLobbyCode(this.value)">
        <button class="btn big ghost" ${U.lobbyBusy?"disabled":""} onclick="A.joinTrip()">${U.lobbyBusy?"處理中⋯":"加入旅程"}</button>
      </div>
      ${U.lobbyErr?`<div class="errbox">${esc(U.lobbyErr)}</div>`:""}
      <div class="hint" style="margin-top:18px;line-height:1.7">
        提醒:知道代碼的人都能查看與編輯該旅程的帳目,請勿記錄敏感資訊。
      </div>
    </div>`;
    return;
  }

  // ── 旅程主畫面 ──
  const {bal, transfers, total} = calc();
  const v = validate();
  const amt = parseFloat(U.amount)||0;
  const H = esc(homeCur());
  const currencyList = [homeCur(), ...Object.keys(rates())];

  let html = `
  <div class="wrap">
    <header class="ticket">
      <div class="eyebrow"><span>TRIP SPLIT · 旅費分帳</span><span class="num" style="letter-spacing:.25em">#${esc(code)}</span></div>
      <input class="trip-name" value="${esc(meta?.tripName||"載入中⋯")}" aria-label="旅程名稱"
        onchange="A.saveTripName(this.value)">
      <div class="meta" id="hdr-meta">
        <span>${esc(myName)} · ${members().length} 位成員 · ${expenses.length} 筆帳</span>
        <span class="num">總額 ${fmt(total)} ${H}</span>
      </div>
      <div class="hole l"></div><div class="hole r"></div>
    </header>
    <div class="syncbar">
      <span class="status ${syncErr?"err":live?"live":""}" id="sync-status">${
        syncErr?"⚠ 連線中斷,恢復網路後會自動同步":live?"● 即時同步中":"連線中⋯"}</span>
      <button class="link" style="font-size:12px;text-decoration:none;font-weight:700" onclick="A.leaveTrip()">離開旅程</button>
    </div>
    <nav>
      ${[["expenses","記帳"],["members","成員"],["settle","結算"]].map(([id,label])=>`
        <button class="${U.tab===id?'on':''}" onclick="A.setTab('${id}')">${label}${
          id==="settle"?settleBadge(transfers.length):""}</button>`).join("")}
    </nav>`;

  if (U.tab==="members"){
    html += `
    <div class="invite">
      <div style="font-size:12.5px;color:var(--muted);margin-bottom:4px">把網址和這組代碼傳給朋友,他們就能加入一起記帳</div>
      <div class="code num">${esc(code)}</div>
    </div>
    <div class="row" style="margin-bottom:14px">
      <input class="field" style="flex:1;background:var(--paper)" placeholder="幫沒手機的朋友代加名字"
        value="${esc(U.newMember)}" oninput="U.newMember=this.value" onkeydown="A.keyMember(event)">
      <button class="btn" style="padding:10px 20px" onclick="A.addMember()">加入</button>
    </div>
    <div id="member-list">${memberListHtml(bal)}</div>`;
  }

  if (U.tab==="expenses"){
    html += `
    <div class="rates">
      <div class="row" style="justify-content:space-between">
        <span style="font-size:13px;font-weight:700">💱 幣別與匯率(全員共用)</span>
        <button class="link" style="font-size:13px;font-weight:600;text-decoration:none" onclick="A.toggleRates()">${U.showRates?"收合 ▲":"設定 ▼"}</button>
      </div>`;
    if (U.showRates){
      html += `
      <div style="margin-top:10px">
        <div class="row" style="margin-bottom:10px">
          <label style="font-size:13px;color:var(--muted);white-space:nowrap">結算幣別</label>
          <input class="field" style="width:80px;text-transform:uppercase" value="${H}"
            onchange="A.setHome(this.value)">
          <span style="font-size:12px;color:var(--faint)">(最後結算用)</span>
        </div>
        ${Object.entries(rates()).map(([c,r])=>`
          <div class="row" style="margin-bottom:8px;font-size:14px">
            <span class="num" style="font-weight:700;width:44px">${esc(c)}</span>
            <span style="font-size:13px;color:var(--muted)">1 ${esc(c)} =</span>
            <input type="number" min="0" step="any" inputmode="decimal" class="field num"
              style="width:90px;padding:7px 10px" value="${r}"
              onchange="A.setRate('${esc(c)}',this.value)">
            <span style="font-size:13px;color:var(--muted)">${H}</span>
            <button class="x" style="margin-left:auto" onclick="A.removeRate('${esc(c)}')">×</button>
          </div>`).join("")}
        <div class="row">
          <input class="field" style="width:76px;padding:8px 10px;text-transform:uppercase" placeholder="幣別"
            list="cur-hints" value="${esc(U.newCode)}" oninput="U.newCode=this.value.toUpperCase()">
          <datalist id="cur-hints">${COMMON.filter(c=>c!==homeCur()&&!rates()[c]).map(c=>`<option value="${c}">`).join("")}</datalist>
          <input class="field num" style="flex:1;padding:8px 10px" type="number" min="0" step="any" inputmode="decimal"
            placeholder="匯率(1外幣=?${H})" value="${esc(U.newRate)}" oninput="U.newRate=this.value">
          <button class="btn small" onclick="A.addRate()">新增</button>
        </div>
        <div class="hint">例:去日本玩,新增 JPY、匯率填 0.22。匯率是全員共用的,改了大家的結算都會即時重算。</div>
      </div>`;
    }
    html += `</div>

    <div class="card">
      <div class="row" style="margin-bottom:10px">
        <input class="field" style="flex:1.6" placeholder="項目,例如:晚餐、車票"
          value="${esc(U.desc)}" oninput="A.input('desc',this.value)">
        <input class="field num" style="flex:1;min-width:70px" type="number" min="0" inputmode="decimal"
          placeholder="金額" value="${esc(U.amount)}" oninput="A.input('amount',this.value)">
        <select class="field num" style="width:84px;padding:10px 6px" onchange="A.inputRe('currency',this.value)">
          ${currencyList.map(c=>`<option value="${esc(c)}" ${c===U.currency?"selected":""}>${esc(c)}</option>`).join("")}
        </select>
      </div>
      <div class="convert num" id="convert-hint" style="display:${U.currency!==homeCur()&&amt>0?"":"none"}">
        ≈ ${fmt(amt*rateOf(U.currency))} ${H}(匯率 ${rateOf(U.currency)})
      </div>
      <div style="margin-bottom:10px">
        <label class="label">誰付的錢</label>
        <select class="field" style="width:100%" id="payer-select" onchange="A.input('payer',this.value)">
          <option value="" disabled ${!U.payer?"selected":""}>選擇付款人</option>
          ${members().map(m=>`<option value="${esc(m)}" ${m===U.payer?"selected":""}>${esc(m)}${m===myName?"(我)":""}</option>`).join("")}

      </div>
      <div style="margin-bottom:12px">
        <label class="label" style="margin-bottom:6px">誰要分攤(點選切換)
          <button class="link" style="margin-left:8px" onclick="A.toggleAll()">${U.sharers.length===members().length?"全部取消":"全選"}</button>

        <div class="row" style="flex-wrap:wrap;gap:6px" id="sharer-chips">${chipsHtml()}</div>
      </div>
      <div style="margin-bottom:12px">
        <div class="row" style="gap:6px;margin-bottom:8px">
          <button class="mode ${U.splitMode==="equal"?"on":""}" onclick="A.setMode('equal')">平均分攤</button>

    if (U.splitMode==="equal"){
      html += `<div class="num" id="equal-hint" style="font-size:12px;color:var(--muted);display:${U.sharers.length&&amt>0?"":"none"}">
        每人分攤 ${U.sharers.length?fmt(amt/U.sharers.length):0} ${esc(U.currency)}${
          U.currency!==homeCur()&&U.sharers.length?` ≈ ${fmt(amt/U.sharers.length*rateOf(U.currency))} ${H}`:""}</div>`;
    } else {
      if (!U.sharers.length){
        html += `<div style="font-size:12.5px;color:var(--faint)">先在上面選好要分攤的人。</div>`;
      } else {
        html += U.sharers.map(m=>`
          <div class="row" style="margin-bottom:6px">
            <span style="font-size:14px;width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(m)}</span>
            <input class="field num" style="flex:1;padding:8px 10px" type="number" min="0" step="any" inputmode="decimal"
              placeholder="0" value="${esc(U.customShares[m]??"")}" oninput="A.setShare('${esc(m)}',this.value)">
            <span style="font-size:12px;color:var(--faint)">${esc(U.currency)}</span>
            <button class="fill-btn" title="填入剩餘金額" onclick="A.fillRemain('${esc(m)}')">補齊</button>
          </div>`).join("");
        html += `<div class="check num ${v.ok?"ok":"bad"}" id="custom-check" style="display:${amt>0?"":"none"}">${
          v.ok ? `✓ 合計 ${fmt(v.sum)} ${esc(U.currency)},剛好等於總金額`
          : (v.diff>0 ? `還差 ${fmt(v.diff)} ${esc(U.currency)} 未分配` : `超出總金額 ${fmt(-(v.diff||0))} ${esc(U.currency)}`)
        }</div>`;
      }
    }
    html += `</div>
      <button class="btn big" id="add-btn" ${v.ok?"":"disabled"} onclick="A.addExpense()">記一筆</button>
    </div>
    <div id="exp-list">${expListHtml()}</div>`;
  }

  if (U.tab==="settle"){
    html += expenses.length
      ? `<div id="settle-box">${settleHtml(bal, transfers, total)}</div>`
      : `<p class="empty">先記幾筆帳,結算結果會出現在這裡。</p>`;
  }

  html += `</div>`;
  $app.innerHTML = html;
}

// ═══════════ 啟動 ═══════════
onAuthStateChanged(auth, async (user) => {
  if (!user) return;
  // 嘗試恢復上次的旅程
  try {
    const s = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
    if (s && s.code && s.name) {
      const snap = await getDoc(doc(db, "trips", s.code));
      if (snap.exists()) { enterTrip(s.code, s.name, "expenses"); return; }
      localStorage.removeItem(SESSION_KEY);
    }
  } catch(e){}
  U.screen = "lobby";
  render();
});

signInAnonymously(auth).catch(e => {
  $app.innerHTML = `<div class="setup">
    <h2 style="color:var(--red)">無法連線到 Firebase</h2>
    <p>錯誤:<code>${esc(e.code||e.message)}</code></p>
    <p>常見原因:① 尚未在 Firebase 控制台啟用「匿名」登入方式(Authentication → Sign-in method → 匿名);
    ② firebaseConfig 貼錯;③ 網域未加入授權清單(Authentication → Settings → 授權網域)。</p>
  </div>`;
});
